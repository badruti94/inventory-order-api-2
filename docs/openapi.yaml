openapi: 3.0.3
info:
  title: Inventory & Order Management API
  version: 1.0.0
  description: |
    Node.js + Express + PostgreSQL (raw SQL), JWT auth, refresh token rotation.
    Use the Authorize button to set Bearer JWT. Responses include X-Request-Id for tracing.

servers:
  - url: http://localhost:3000
  - url: http://203.194.115.192:3000
  - url: https://badru.cloud

tags:
  - name: Auth
  - name: Products
  - name: Orders

components:
  headers:
    XRequestId:
      description: Request trace ID. Include this when reporting issues.
      schema:
        type: string
        example: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  responses:
    Unauthorized:
      description: Unauthorized
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Unauthorized:
              value:
                success: false
                code: UNAUTHORIZED
                message: Invalid or expired token
                requestId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
    
    Forbidden:
      description: Forbidden
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Forbidden:
              value:
                success: false
                code: FORBIDDEN
                message: Forbidden
                requestId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11

    NotFound:
      description: Not Found
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            NotFound:
              value:
                success: false
                code: NOT_FOUND
                message: Resource not found
                requestId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
    
    ValidationError:
      description: Validation Error
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Validation:
              value:
                success: false
                code: VALIDATION_ERROR
                message: items must be a non-empty array
                requestId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
                
    EmailAlreadyUsed:
      description: Email Already Used
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            EmailAlreadyUsed:
              value:
                success: false
                code: EMAIL_ALREADY_USED
                message: Email already registered
                requestId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
    
    RateLimited:
      description: Too many requests
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            RateLimited:
              value:
                success: false
                code: RATE_LIMITED
                message: Too many login attempts
                requestId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11


  schemas:
    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Product'
    ProductsListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                products:
                  type: array
                  items:
                    $ref: '#/components/schemas/Product'
    LoginWrappedResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LoginResponse'
    
    RegisterWrappedResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RegisterResponse'
    RefreshWrappedResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RefreshResponse'
    LogoutWrappedResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LogoutResponse'
    ErrorResponse:
      type: object
      required: [success, code, message]
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: Invalid or expired token
        requestId:
          type: string
          example: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
        details:
          type: object
          nullable: true
    
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        price: { type: number, example: 3500 }
        stock: { type: integer, example: 100 }
        created_at: { type: string, format: date-time }
    
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string }
        role: { type: string, example: customer }
        created_at: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string, format: password }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string, format: password }
    
    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
    
    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
    
    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
    
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    
    RefreshResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    
    LogoutResponse:
      type: object
      properties:
        loggedOut: { type: boolean, example: true }
    
    CreateProductRequest:
      type: object
      required: [name, price, stock]
      properties:
        name: { type: string }
        price: { type: number }
        stock: { type: integer }
    
    UpdateProductRequest:
      type: object
      properties:
        name: { type: string }
        price: { type: number }
        stock: { type: integer }

    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
            examples:
              RegisterExample:
                value:
                  name: Yopi
                  email: yopi@test.com
                  password: Password123!
      responses:
        '201':
          description: Created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterWrappedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/EmailAlreadyUsed'
  
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            examples:
              LoginExample:
                value:
                  email: yopi@test.com
                  password: Password123!
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginWrappedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token (rotation)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
            examples:
              RefreshExample:
                value:
                  refreshToken: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshWrappedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
            examples:
              value:
                refreshToken: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/LogoutWrappedResponse'
  
  /products:
    get:
      tags: [Products]
      summary: List Products
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: searchField
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: integer }
        - in: query
          name: maxPrice
          schema: { type: integer }
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsListResponse'
    post:
      tags: [Products]
      summary: Create product (admin/staff)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductRequest' }
            examples:
              CreateProductExample:
                value:
                  name: Indomie Goreng
                  price: 3500
                  stock: 100
      responses:
        '201':
          description: Created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  
  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Products]
      summary: Update product (admin/staff)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductRequest' }
            examples:
              CreateProductExample:
                value:
                  name: Indomie
                  price: 3000
                  stock: 50
      responses:
        '200': { description: OK }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Products]
      summary: Delete product (admin/staff)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200': { description: OK }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  
  /orders:
    post:
      tags: [Orders]
      summary: Create order (authorized)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
            examples:
              CreateOrderExample:
                value:
                  items:
                    - productId: 3a6f2e52-3c70-4e62-8f2d-6d5c0b7d4c11
                      quantity: 2
      responses:
        '201':
          description: Created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      order:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          user_id: { type: string, format: uuid }
                          total_price: { type: number }
                          created_at: { type: string, format: date-time }
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            productId: { type: string, format: uuid }
                            quantity: { type: integer }
                            price: { type: number }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

        
